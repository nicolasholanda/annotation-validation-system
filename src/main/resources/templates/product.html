<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Form</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <div class="card">
        <h2>Product Form</h2>
        <form th:action="@{/product}" th:object="${form}" method="post">
            <div class="form-group">
                <label for="name">Product Name</label>
                <input type="text" id="name" th:field="*{name}" placeholder="Enter product name">
                <div th:each="error : ${errors}" th:if="${error.field == 'name'}" class="error-msg" th:text="${error.message}"></div>
            </div>
            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" th:field="*{description}" placeholder="Enter description"></textarea>
                <div th:each="error : ${errors}" th:if="${error.field == 'description'}" class="error-msg" th:text="${error.message}"></div>
            </div>
            <div class="form-group">
                <label for="price">Price</label>
                <input type="text" id="price" th:field="*{price}" placeholder="Enter price (e.g. 29.99)">
                <div th:each="error : ${errors}" th:if="${error.field == 'price'}" class="error-msg" th:text="${error.message}"></div>
            </div>
            <div class="form-group">
                <label for="stock">Stock</label>
                <input type="text" id="stock" th:field="*{stock}" placeholder="Enter stock quantity">
                <div th:each="error : ${errors}" th:if="${error.field == 'stock'}" class="error-msg" th:text="${error.message}"></div>
            </div>
            <button type="submit" class="btn btn-secondary">Submit Product</button>
        </form>
        <a th:href="@{/}" class="back-link">← Back to home</a>
    </div>
</div>
</body>
</html>
