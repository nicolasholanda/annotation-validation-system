<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Registration</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <div class="card">
        <h2>User Registration</h2>
        <form th:action="@{/registration}" th:object="${form}" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" th:field="*{username}" placeholder="Enter username">
                <div th:each="error : ${errors}" th:if="${error.field == 'username'}" class="error-msg" th:text="${error.message}"></div>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="text" id="email" th:field="*{email}" placeholder="Enter email">
                <div th:each="error : ${errors}" th:if="${error.field == 'email'}" class="error-msg" th:text="${error.message}"></div>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" th:field="*{password}" placeholder="Enter password">
                <div th:each="error : ${errors}" th:if="${error.field == 'password'}" class="error-msg" th:text="${error.message}"></div>
            </div>
            <div class="form-group">
                <label for="age">Age</label>
                <input type="text" id="age" th:field="*{age}" placeholder="Enter age">
                <div th:each="error : ${errors}" th:if="${error.field == 'age'}" class="error-msg" th:text="${error.message}"></div>
            </div>
            <button type="submit" class="btn btn-primary">Register</button>
        </form>
        <a th:href="@{/}" class="back-link">← Back to home</a>
    </div>
</div>
</body>
</html>
